# Docker Compose base file (DB + volúmenes)
services:
  db:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-taller_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taller_password}
      POSTGRES_DB: ${DB_NAME:-taller_db}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-taller_user} -d ${DB_NAME:-taller_db}']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
